services:
  - type: web
    name: costguard
    runtime: python
    plan: free
    buildCommand: |
      pip install -e . &&
      cd frontend && npm install && npm run build
    startCommand: uvicorn costguard.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
